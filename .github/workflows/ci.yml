name: ci

on:
  pull_request:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements/dev.txt
      - name: Install pinned frontend dependencies
        run: npm ci
      - name: Verify generated OpenAPI types
        run: |
          npm run console:generate
          git diff --exit-code -- frontend/console-next/src/api/generated.ts
      - name: Verify console frontend
        run: |
          npm run console:lint
          npm run console:test
          npm run console:typecheck
          npm run console:build
          test -f frontend/console-next/dist/index.html
          test -f frontend/console-next/dist/.vite/manifest.json
      - name: Install browser test engines
        run: npx playwright install --with-deps chromium firefox webkit
      - name: Run console browser acceptance
        run: npm run console:e2e
      - name: Run ruff lint
        run: python -m ruff check app tools tests
      - name: Run Python tests with coverage
        run: python -m pytest -q --cov=app --cov=tools --cov-report=term --cov-report=xml --durations=15
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
      - name: Run strict type checks
        run: python tools/type_check.py
      - name: Verify dependency lock policy
        run: python tools/deploy_check.py --json --skip-node
      - name: Run Node SDK contract tests
        run: npm run check
      - name: Run deployment contract checks
        run: python tools/deploy_check.py --json
      - name: Run example model regression gates
        run: python tools/portrait_model_regression.py --manifest examples/portrait-model-regression.example.yml --json
      - name: Run example model A/B shadow gates
        run: python tools/portrait_model_regression.py --manifest examples/portrait-model-ab-shadow.example.yml --json
      - name: Run production readiness gate
        # scope=platform 保留模板/数据栈/安全/契约/模型文件检查，跳过需要真实生产模型产物的
        # 能力状态检查（CI runner 不携带这些大模型）。任何 strict 失败都会使该步骤非零退出。
        run: python tools/portrait_production_readiness.py --strict --scope platform
