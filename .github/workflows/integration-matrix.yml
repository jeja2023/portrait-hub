name: production-integration-matrix

on:
  workflow_dispatch:
  schedule:
    - cron: "23 20 * * 2"
  # 数据后端实现或生产可选依赖变更时在 PR 上按需运行，
  # 避免后端回归要等每周定时任务才被发现。
  pull_request:
    paths:
      - "app/postgres_*.py"
      - "app/portrait_postgres.py"
      - "app/portrait_vector_store.py"
      - "app/portrait_object_storage.py"
      - "app/portrait_task_queue.py"
      - "requirements/prod-optional.txt"
      - "tests/test_production_integration_containers.py"

jobs:
  external-services:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        stack: [postgres, qdrant, redis, minio]
    env:
      PORTRAIT_RUN_CONTAINER_INTEGRATION_TESTS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: 安装集成测试依赖
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements/dev.txt
      - name: 运行选定集成测试
        run: |
          case "${{ matrix.stack }}" in
            postgres) python -m pytest -q tests/test_production_integration_containers.py::test_postgres_container_gallery_round_trip ;;
            qdrant) python -m pytest -q tests/test_production_integration_containers.py::test_qdrant_container_health_round_trip ;;
            redis) python -m pytest -q tests/test_production_integration_containers.py::test_redis_container_queue_round_trip ;;
            minio) python -m pytest -q tests/test_production_integration_containers.py::test_minio_container_s3_round_trip ;;
          esac
