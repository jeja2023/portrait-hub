name: security-audit

on:
  pull_request:
    paths:
      - "requirements.txt"
      - "requirements/**"
      - "tools/security_audit.py"
      - ".github/workflows/security-audit.yml"
  push:
    branches: ["main", "master"]
    paths:
      - "requirements.txt"
      - "requirements/**"
      - "tools/security_audit.py"
      - ".github/workflows/security-audit.yml"
  workflow_dispatch:
  schedule:
    - cron: "23 19 * * 1"

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install audit tool
        run: |
          python -m pip install --upgrade pip
          python -m pip install "pip-audit>=2.7.3,<3.0.0"
      - name: Audit dependency manifests
        run: python tools/security_audit.py
