name: security-audit

on:
  # 每个 PR 与 push 都运行（不仅在清单变更时），使针对已钉版传递依赖的新披露公告
  # 能够阻断合并。
  pull_request:
  push:
    branches: ["main", "master"]
  workflow_dispatch:
  schedule:
    - cron: "23 19 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install audit tool
        run: |
          python -m pip install --upgrade pip
          python -m pip install "pip-audit>=2.7.3,<3.0.0"
      - name: Audit dependency manifests
        run: python tools/security_audit.py
