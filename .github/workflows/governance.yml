name: governance

on:
  pull_request:
  push:
    branches: ["main", "master"]
  workflow_dispatch:
  schedule:
    - cron: "17 21 * * 3"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-governance:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Check repository governance
        run: python tools/governance_check.py --json
      - name: Check model governance
        run: python tools/model_governance_check.py --strict-governance --strict-hash --strict-sidecars --allow-missing-artifacts --json
