groups:
  - name: portrait-hub
    rules:
      - alert: PortraitHubHighErrorRate
        expr: sum(rate(gpu_worker_requests_total{status=~"5.."}[5m])) / clamp_min(sum(rate(gpu_worker_requests_total[5m])), 1) > 0.02
        for: 10m
        labels:
          severity: page
        annotations:
          summary: PortraitHub 5xx rate is above 2%
      - alert: PortraitHubHighInferenceLatency
        expr: histogram_quantile(0.95, sum(rate(gpu_worker_inference_seconds_bucket[5m])) by (le)) > 2
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: PortraitHub inference p95 latency is above 2s
      - alert: PortraitHubGpuMemoryNearLimit
        expr: gpu_worker_gpu_memory_used_bytes / clamp_min(gpu_worker_gpu_memory_total_bytes, 1) > 0.90
        for: 5m
        labels:
          severity: page
        annotations:
          summary: PortraitHub GPU memory usage is above 90%
      - alert: PortraitHubGpuQueueBacklog
        expr: max(gpu_worker_gpu_device_queue_depth) > 0
        for: 15m
        labels:
          severity: ticket
        annotations:
          summary: PortraitHub GPU queue has sustained backlog
      - alert: PortraitHubUnexpectedCpuFallback
        # 在面向 GPU 的部署中，任何 CPU 回退都表示推理运行时降级。
        # 启用 FORCE_CPU 的主机不会递增该计数器，因此该告警会保持静默。
        expr: sum(rate(gpu_worker_cpu_fallback_total[10m])) > 0
        for: 10m
        labels:
          severity: page
        annotations:
          summary: PortraitHub fell back to CPU inference (GPU runtime degraded)
      - alert: PortraitHubStreamReconnectSpike
        expr: sum(increase(gpu_worker_stream_reconnects_total[15m])) > 5
        for: 15m
        labels:
          severity: ticket
        annotations:
          summary: PortraitHub stream workers are reconnecting repeatedly
      - alert: PortraitHubStreamBackpressureDrops
        expr: sum(increase(gpu_worker_stream_backpressure_drops_total[15m])) > 0
        for: 15m
        labels:
          severity: ticket
        annotations:
          summary: PortraitHub stream backpressure is dropping frames
      - alert: PortraitHubLowVideoSamplingQuality
        # 15 分钟内选中帧质量中位数低于 0.4（可能表示源质量较差或采样过于激进）。
        expr: histogram_quantile(0.5, sum(rate(gpu_worker_video_frame_quality_bucket[15m])) by (le)) < 0.4
        for: 15m
        labels:
          severity: ticket
        annotations:
          summary: PortraitHub video sampling quality median is below 0.4
      - alert: PortraitHubHighNearDuplicateDropRate
        # 超过 30% 的候选帧因近重复被丢弃（可能表示采样间隔配置错误或视频画面静止）。
        expr: sum(rate(gpu_worker_video_near_duplicate_drops_total[10m])) / clamp_min(sum(rate(gpu_worker_video_frames_considered_total[10m])), 1) > 0.3
        for: 15m
        labels:
          severity: ticket
        annotations:
          summary: PortraitHub near-duplicate drop rate is above 30%
