# PortraitHub internal gateway example.
# Replace hostnames, certificates, auth_request, and rate limits before production use.

upstream portrait_hub_api {
    least_conn;
    keepalive 32;
    server gpu-worker-0:8000 max_fails=3 fail_timeout=15s;
    server gpu-worker-1:8000 max_fails=3 fail_timeout=15s;
}

map $http_x_request_id $portrait_request_id {
    default $http_x_request_id;
    "" $request_id;
}

limit_req_zone $http_x_tenant_id zone=portrait_tenant:20m rate=120r/m;

server {
    listen 443 ssl http2;
    server_name portrait.internal.example;

    ssl_certificate /etc/nginx/tls/portrait-hub.crt;
    ssl_certificate_key /etc/nginx/tls/portrait-hub.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 768m;
    proxy_connect_timeout 5s;
    proxy_send_timeout 900s;
    proxy_read_timeout 900s;
    proxy_buffering off;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    location = /health {
        proxy_pass http://portrait_hub_api;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $portrait_request_id;
    }

    location = /ready {
        proxy_pass http://portrait_hub_api;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $portrait_request_id;
    }

    location = /ready/deep {
        if ($http_authorization = "") { return 401; }
        proxy_pass http://portrait_hub_api;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $portrait_request_id;
        proxy_set_header X-Tenant-ID $http_x_tenant_id;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-API-Key $http_x_api_key;
    }

    location = /metrics {
        if ($http_authorization = "") { return 401; }
        proxy_pass http://portrait_hub_api;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $portrait_request_id;
        proxy_set_header X-Tenant-ID $http_x_tenant_id;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-API-Key $http_x_api_key;
    }

    location /v1/ {
        if ($http_x_tenant_id = "") { return 400; }
        limit_req zone=portrait_tenant burst=240 nodelay;
        proxy_pass http://portrait_hub_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $portrait_request_id;
        proxy_set_header X-Tenant-ID $http_x_tenant_id;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-API-Key $http_x_api_key;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
